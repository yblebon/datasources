# ─────────────────────────────────────────────────────────────────────────────
#  Workflow definition file
#  Run with: bun run index.ts playlist.toml
# ─────────────────────────────────────────────────────────────────────────────

[flow]
name    = "Playlist workflow"

  # Global environment variables — inherited by every step
  [flow.env]


[[flow.step]]
name    = "Clone tools"
module  = "git-clone"
hook_id = "clone-tools"

  [flow.step.params]
  repo    = "git@github.com:yblebon/tools.git"
  branch  = "main"
  dir     = "tools"
  include = ["scrapers/playlist", "requirements.txt"]


[[flow.step]]
name    = "Install virtual env"
info    = "Install python virtualenv"
command = "python3 -m venv venv"
hook_id = "install-venv"
skip = false
cache = ["venv"]

[[flow.step]]
name    = "Install requirements"
info    = "Install python requirements.txt"
command = "source venv/bin/activate && cd tools && pip install -r requirements.txt"
hook_id = "pip-install"
wait    = ["clone-tools", "install-venv"]
skip = false

[[flow.step]]
name    = "Load playlist"
info    = "Load the list of singers"
command = "source venv/bin/activate &&  cd tools/scrapers/playlist && scrapy crawl wiki_music_deaths_2025_2026_with_yt"
hook_id = "load-playlist"
wait    = ["pip-install"]
skip = false

[[flow.step]]
name    = "Publish playlist"
module  = "git-push"
hook_id = "publish"
wait = ["load-playlist"]

  [flow.step.params]
  repo       = "git@github.com:yblebon/datasources.git"
  branch     = "bot/test"
  message    = "pipeline: updating playlist"
  user_name  = "Pipeline Bot"
  user_email = "ci@bot.com"

  [flow.step.params.include]
  "tools/scrapers/playlist/popular_music_deaths_2025_2026_with_youtube.json" = "playlist.json"









