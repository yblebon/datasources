name: Run Digdag Pipeline with Custom Docker Image

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-digdag:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
      
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: yblebon/datasources
          path: datasources
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Install Oracle JDK 25.0.2
        run: |
          wget -O /tmp/jdk-25_linux-x64_bin.deb \
            "https://download.oracle.com/java/25/latest/jdk-25_linux-x64_bin.deb"
          sudo apt-get update
          sudo apt-get install -y /tmp/jdk-25_linux-x64_bin.deb

          # Adjust path to the real directory created by the .deb
          sudo update-alternatives --install /usr/bin/java java /usr/lib/jvm/jdk-25.0.2-oracle-x64/bin/java 1
          sudo update-alternatives --set java /usr/lib/jvm/jdk-25.0.2-oracle-x64/bin/java

          java --version

      - name: Install digdag (no AggressiveOpts)
        run: |
          curl -o ~/bin/digdag --create-dirs -L "https://dl.digdag.io/digdag-latest"
          chmod +x ~/bin/digdag
          echo 'export PATH="$HOME/bin:$PATH"' >> ~/.bashrc
          echo 'export DIGDAG_JAVA_OPTS="-Xmx512m"' >> ~/.bashrc  # Clean JVM opts
          export PATH="$HOME/bin:$PATH"
          export DIGDAG_JAVA_OPTS="-Xmx512m"
          digdag --version

      
      - name: Run Digdag task
        run: |
          /usr/local/bin/digdag run pipelines.dig
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digdag-logs
          path: .digdag/
          retention-days: 30
