name: Run Digdag Task

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-digdag:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Install Digdag
        run: |
          curl -o digdag https://dl.digdag.io/digdag-latest
          chmod +x digdag
          sudo mv digdag /usr/local/bin/
          
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: yblebon/datasources
          path: datasources
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run Digdag pipeline in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/digdag/digdag:latest \
            digdag run pipelines.dig
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digdag-logs
          path: .digdag/
          retention-days: 30
        with:
          name: digdag-logs
          path: .digdag/
          retention-days: 30
