name: Run Digdag Pipeline with Custom Docker Image

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-digdag:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
      
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: yblebon/datasources
          path: datasources
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Digdag Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: digdag:latest
      
      - name: Run Digdag pipeline
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            digdag:latest \
            digdag run pipelines.dig
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digdag-logs
          path: .digdag/
          retention-days: 30
