name: Run Digdag Pipeline with Prebuilt Image

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-digdag:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
      
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: owner/external-repo-name
          path: external-repo
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run Digdag pipeline in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/digdag/digdag:latest \
            digdag run pipelines.dig
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digdag-logs
          path: .digdag/
          retention-days: 30
